name: yurucommu
version: "1.0.0"

publish:
  - name: yurucommu-ui
    type: takos.ui-surface.v1
    display:
      title: Yurucommu
      description: Self-hosted ActivityPub community social
      icon: /icons/yurucommu.svg
      category: social
      sortOrder: 40
    outputs:
      url:
        kind: url
        routeRef: ui

compute:
  web:
    icon: /icons/yurucommu.svg
    build:
      fromWorkflow:
        path: .takos/workflows/deploy.yml
        job: build-web
        artifact: web
        artifactPath: dist/takos-worker.js
    readiness: /readyz
    env:
      DELIVERY_QUEUE_NAME: yurucommu-delivery
      DELIVERY_DLQ_NAME: yurucommu-delivery-dlq
      YURUCOMMU_STRICT_READINESS: "1"
    consume:
      - publication: yurucommu-ui
        env:
          url: APP_URL
      - publication: takos.oauth-client
        as: yurucommu-oauth
        request:
          clientName: Yurucommu
          redirectUris:
            - /api/auth/callback/takos
          scopes:
            - openid
            - profile
            - email
            - spaces:read
            - repos:read
        env:
          clientId: TAKOS_CLIENT_ID
          clientSecret: TAKOS_CLIENT_SECRET
          issuer: TAKOS_URL
    triggers:
      queues:
        - binding: DELIVERY_QUEUE
          deadLetterQueue: DELIVERY_DLQ
          maxBatchSize: 10
          maxRetries: 3
        - binding: DELIVERY_DLQ
          maxBatchSize: 10
          maxWaitTimeMs: 60000
          maxRetries: 1

resources:
  yurucommu-db:
    type: sql
    migrations: migrations
    bindings:
      web: DB
  yurucommu-media:
    type: object-store
    bindings:
      web: MEDIA
  yurucommu-kv:
    type: key-value
    bindings:
      web: KV
  yurucommu-delivery:
    type: queue
    bindings:
      web: DELIVERY_QUEUE
  yurucommu-delivery-dlq:
    type: queue
    bindings:
      web: DELIVERY_DLQ
  yurucommu-encryption-key:
    type: secret
    generate: true
    bind: ENCRYPTION_KEY
    to: web

routes:
  - id: ui
    target: web
    path: /
