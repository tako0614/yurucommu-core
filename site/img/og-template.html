<!doctype html>
<!--
  OG card source for yurucommu.com (1200x630). Rendered to og.png by loading this
  file in a 1200x630 viewport and screenshotting it. Edit here, then regenerate.
-->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0b;
        --ink: #fafafa;
        --dim: #a1a1aa;
        --accent: #3b82f6;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: "Noto Sans JP", sans-serif;
        position: relative;
        overflow: hidden;
      }
      /* Soft accent glow in the corner, echoing the landing page's ink accents. */
      .glow {
        position: absolute;
        width: 720px;
        height: 720px;
        right: -220px;
        bottom: -260px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.22),
          rgba(59, 130, 246, 0) 70%
        );
      }
      .frame {
        position: absolute;
        inset: 0;
        padding: 76px 84px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        font-size: 24px;
        letter-spacing: 0.32em;
        color: var(--dim);
        text-transform: uppercase;
      }
      .title {
        font-weight: 900;
        font-size: 108px;
        line-height: 1.04;
        letter-spacing: -0.01em;
        margin-top: auto;
        margin-bottom: 28px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        font-weight: 700;
        font-size: 38px;
      }
      .brand .dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent);
      }
      .sub {
        font-weight: 500;
        font-size: 28px;
        color: var(--dim);
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="frame">
      <div class="eyebrow">Self-hosted ActivityPub SNS</div>
      <div class="title">自分の輪を、<br />自分でつくる。</div>
      <div class="row">
        <div class="brand">yurucommu</div>
        <div class="sub">自分ひとりのための、小さな SNS</div>
      </div>
    </div>
  </body>
</html>
