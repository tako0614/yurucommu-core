apiVersion: v1

# Short kind names are operator-profile aliases. Gateway listeners/routes are
# gateway descriptor spec fields, not AppSpec core fields.
metadata:
  id: com.yurucommu.app
  name: Yurucommu
  description: Self-hosted ActivityPub community social app for small communities.
  publisher: takos
  homepage: https://github.com/tako0614/yurucommu

# ---------------------------------------------------------------------------
# Runtime bindings declared as AppSpec components:
#
# The worker runtime hard-requires KV (session / OAuth state / rate-limit
# counters) and the outbound ActivityPub delivery queues (DELIVERY_QUEUE +
# DELIVERY_DLQ). These are now declared below as `kv-store` / `message-queue`
# components and `connect`-ed into the worker, so the Takosumi install/deploy
# path provisions them through the kernel instead of requiring bespoke
# wrangler.toml `[[kv_namespaces]]` / `[[queues.producers]]` editing.
#
# Remaining operator-supplied secret (not a provisionable AppSpec component
# kind): ENCRYPTION_KEY (encrypts session + sensitive tokens). The official
# catalog has no `secret-env` component kind to declare a bare operator
# secret, so ENCRYPTION_KEY is still supplied via deploy-config `[vars]` /
# secret. See README.md for the operator-side note on this remaining split.
# ---------------------------------------------------------------------------
components:
  web:
    kind: worker
    spec:
      entrypoint: dist/worker.js
    connect:
      db:
        output: db.connection
        inject: secret-env
        prefix: DB
      media:
        output: media.bucket
        inject: secret-env
        prefix: MEDIA
      kv:
        output: kv.store
        inject: secret-env
        prefix: KV
      delivery-queue:
        output: delivery-queue.producer
        inject: secret-env
        prefix: DELIVERY_QUEUE
      delivery-dlq:
        output: delivery-dlq.producer
        inject: secret-env
        prefix: DELIVERY_DLQ
    listen:
      oidc:
        path: identity.primary.oidc
        inject: secret-env
        prefix: OIDC
        required: true

  public:
    kind: gateway
    connect:
      upstream:
        output: web.http
        inject: upstream
    spec:
      listeners:
        public:
          protocol: https
      routes:
        - listener: public
          path: /
          to: upstream

  db:
    kind: postgres
    spec:
      version: "16"
      size: small

  media:
    kind: object-store
    spec:
      name: yurucommu-media

  kv:
    kind: kv-store
    spec:
      name: yurucommu-kv

  delivery-queue:
    kind: message-queue
    spec:
      name: yurucommu-delivery

  delivery-dlq:
    kind: message-queue
    spec:
      name: yurucommu-delivery-dlq

publish:
  public:
    output: public.public
    path: yurucommu.http.public
