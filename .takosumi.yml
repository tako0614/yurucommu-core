apiVersion: v1

# Short kind names are operator-profile aliases. Gateway listeners/routes are
# gateway descriptor spec fields, not AppSpec core fields.
metadata:
  id: com.yurucommu.app
  name: Yurucommu
  description: Self-hosted ActivityPub community social app for small communities.
  publisher: takos
  homepage: https://github.com/tako0614/yurucommu

components:
  web:
    kind: worker
    spec:
      entrypoint: dist/worker.js
    publish:
      http:
        as: http-endpoint
    listen:
      db:
        from: db.connection
        as: secret-env
        prefix: DB
      media:
        from: media.bucket
        as: secret-env
        prefix: MEDIA
      oidc:
        from: operator.identity.oidc
        as: secret-env
        prefix: OIDC
        required: true

  public:
    kind: gateway
    listen:
      upstream:
        from: web.http
        as: upstream
    publish:
      public:
        as: http-endpoint
    spec:
      listeners:
        public:
          protocol: https
      routes:
        - listener: public
          path: /
          to: upstream

  db:
    kind: postgres
    spec:
      size: small
    publish:
      connection:
        as: service-binding

  media:
    kind: object-store
    spec:
      name: yurucommu-media
    publish:
      bucket:
        as: object-store
