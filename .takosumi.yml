apiVersion: v1

metadata:
  id: com.yurucommu.app
  name: Yurucommu
  description: Self-hosted ActivityPub community social app for small communities.
  publisher: takos
  homepage: https://github.com/tako0614/yurucommu

components:
  web:
    kind: worker
    spec:
      entrypoint: dist/worker.js
      routes:
        - /
        - /api
        - /media
        - /.well-known
        - /ap
        - /users
        - /communities
        - /inbox
        - /api/auth/callback/takos
    listen:
      db:
        from: db.connection
        as: env
        prefix: DB
      media:
        from: media.bucket
        as: env
        prefix: MEDIA
      oidc:
        from: namespace:operator.identity.oidc
        as: env

  db:
    kind: postgres
    spec:
      size: small
    publish:
      connection:
        as: service-binding

  media:
    kind: object-store
    spec:
      name: yurucommu-media
    publish:
      bucket:
        as: object-store
