apiVersion: v1

# Short kind names are operator-profile aliases. Gateway listeners/routes are
# gateway descriptor spec fields, not AppSpec core fields.
metadata:
  id: com.yurucommu.app
  name: Yurucommu
  description: Self-hosted ActivityPub community social app for small communities.
  publisher: takos
  homepage: https://github.com/tako0614/yurucommu

components:
  web:
    kind: worker
    spec:
      entrypoint: dist/worker.js
    connect:
      db:
        output: db.connection
        inject: secret-env
        prefix: DB
      media:
        output: media.bucket
        inject: secret-env
        prefix: MEDIA
    listen:
      oidc:
        path: identity.primary.oidc
        inject: secret-env
        prefix: OIDC
        required: true

  public:
    kind: gateway
    connect:
      upstream:
        output: web.http
        inject: upstream
    spec:
      listeners:
        public:
          protocol: https
      routes:
        - listener: public
          path: /
          to: upstream

  db:
    kind: postgres
    spec:
      version: "16"
      size: small

  media:
    kind: object-store
    spec:
      name: yurucommu-media

publish:
  public:
    output: public.public
    path: yurucommu.http.public
