apiVersion: v1

# Short kind names are operator-profile aliases. Gateway listeners/routes are
# gateway descriptor spec fields, not AppSpec core fields.
metadata:
  id: com.yurucommu.app
  name: Yurucommu
  description: Self-hosted ActivityPub community social app for small communities.
  publisher: takos
  homepage: https://github.com/tako0614/yurucommu

# ---------------------------------------------------------------------------
# Known gap (tracked, not yet resolved):
#
# Yurucommu's worker runtime also requires the following runtime bindings,
# which the operator must currently supply via deploy-config (e.g. the
# accompanying wrangler.toml `[[kv_namespaces]]` / `[[queues.producers]]` /
# `[vars]` sections) rather than via AppSpec components:
#
#   - KV               (session / OAuth state / rate-limit counters)
#   - DELIVERY_QUEUE   (outbound ActivityPub delivery queue)
#   - DELIVERY_DLQ     (delivery dead-letter queue)
#   - ENCRYPTION_KEY   (secret env; encrypts session + sensitive tokens)
#
# These are NOT yet declared here as `kv-store` / `message-queue` /
# secret-env components because the deploy facade still passes them through
# directly. See README.md lines 122-128 for the operator-side note on this
# split. Future work: introduce explicit AppSpec components for KV /
# delivery queues / ENCRYPTION_KEY so the install/deploy path can provision
# them through the kernel without bespoke wrangler.toml editing.
# ---------------------------------------------------------------------------
components:
  web:
    kind: worker
    spec:
      entrypoint: dist/worker.js
    connect:
      db:
        output: db.connection
        inject: secret-env
        prefix: DB
      media:
        output: media.bucket
        inject: secret-env
        prefix: MEDIA
    listen:
      oidc:
        path: identity.primary.oidc
        inject: secret-env
        prefix: OIDC
        required: true

  public:
    kind: gateway
    connect:
      upstream:
        output: web.http
        inject: upstream
    spec:
      listeners:
        public:
          protocol: https
      routes:
        - listener: public
          path: /
          to: upstream

  db:
    kind: postgres
    spec:
      version: "16"
      size: small

  media:
    kind: object-store
    spec:
      name: yurucommu-media

publish:
  public:
    output: public.public
    path: yurucommu.http.public
