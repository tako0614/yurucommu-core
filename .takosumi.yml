apiVersion: takosumi.dev/v1
kind: App

metadata:
  id: com.yurucommu.app
  name: Yurucommu
  description: Self-hosted ActivityPub community social app for small communities.
  publisher: takos
  homepage: https://github.com/tako0614/yurucommu

components:
  web:
    kind: worker
    build:
      command: deno task build:worker
      output: dist/worker.js
    routes:
      - /
      - /api
      - /media
      - /.well-known
      - /ap
      - /users
      - /communities
      - /inbox
      - /api/auth/callback/takos
    listen:
      com.yurucommu.app.db:
        as: env
        prefix: DB_
      com.yurucommu.app.media:
        as: env
        prefix: MEDIA_
      operator.identity.oidc:
        as: env

  db:
    kind: postgres
    spec:
      size: small
    publish:
      - com.yurucommu.app.db

  media:
    kind: object-store
    spec:
      name: yurucommu-media
    publish:
      - com.yurucommu.app.media

interfaces:
  launch:
    target: web
    path: /api/auth/login/takos

  health:
    target: web
    path: /readyz

permissions:
  requested:
    - logs.read.own
