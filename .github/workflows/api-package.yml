name: Core Packages

on:
  push:
    tags:
      - "api-v*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish @takosjp/yurucommu-core and @takosjp/yurucommu-api to npm"
        required: false
        default: false
        type: boolean

concurrency:
  group: yurucommu-core-packages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: 1.3.14

      - name: Cache Bun deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pinned: v5.0.5 (2026)
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: ${{ runner.os }}-bun-yurucommu-core-packages-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-yurucommu-core-packages-

      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test
      - run: bun run build:api
      - run: bun run check:release-contents
      - run: bun run check:packed-consumer
      - run: bun run pack:core
      - run: bun run pack:api

      - name: Preflight core npm release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
        run: bun scripts/publish-package-resumable.mjs . --check-only

      - name: Preflight API npm release
        if: startsWith(github.ref, 'refs/tags/api-v') || startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
        run: bun scripts/publish-package-resumable.mjs packages/api --check-only

      - name: Publish core to npm
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun scripts/publish-package-resumable.mjs .

      - name: Publish API to npm
        if: startsWith(github.ref, 'refs/tags/api-v') || startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun scripts/publish-package-resumable.mjs packages/api
