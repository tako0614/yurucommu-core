name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: yurucommu-core-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # pinned: v2.0.2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pinned: v5.0.5 (2026)
        with:
          path: ${{ env.BUN_INSTALL_CACHE_DIR }}
          key: ${{ runner.os }}-bun-yurucommu-core-ci-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-yurucommu-core-ci-
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check
      - run: bun run check
      # `test` also runs build:api and check:release-contents.
      - run: bun run test
      - run: bun run check:packed-consumer
