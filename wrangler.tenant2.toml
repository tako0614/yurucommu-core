name = "yurucommu-2"
main = "src/backend/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[vars]
# NOTE: TAKOS_URL は example operator host です。 test.takos.jp は 1 つの
# self-host instance であり、 yurucommu が baked-in default として持つ identity
# ではありません (design-principles.md §0.6, §7 hostnames = operator-deployment
# choice)。 自分の Takos host に置き換えるか、 Takos 連携を使わない場合はこの行を
# 削除して ENABLE_TAKOS_PROXY / ENABLE_TAKOS_TOOLS を false (default) のままに
# してください。
TAKOS_URL = "https://test.takos.jp"
# NOTE: APP_URL は example test deployment 値です。 hostname は
# operator-deployment choice (architectural fixed point ではない)。
# 別 hostname で運用する場合は self-host 先の canonical hostname に変更してください。
APP_URL = "https://test2.yurucommu.com"
# Queue names must match the [[queues.*]] bindings below so the
# `handleYurucommuQueueBatch` dispatcher routes batches to the correct
# handler. Each tenant runs its own queue pair to avoid cross-tenant
# delivery.
DELIVERY_QUEUE_NAME = "yurucommu-delivery-2"
DELIVERY_DLQ_NAME = "yurucommu-delivery-dlq-2"
# Password authentication is enabled by setting AUTH_PASSWORD_HASH via wrangler secret put.
# Format: saltHex:hashHex
# AUTH_PASSWORD_HASH = "0123456789abcdef0123456789abcdef:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
#
# Session and token encryption:
# ENCRYPTION_KEY = "..."  # Generate with: openssl rand -hex 32

# Secrets (set via wrangler secret put):
# - TAKOS_CLIENT_ID
# - TAKOS_CLIENT_SECRET
# - AUTH_PASSWORD_HASH
# - ENCRYPTION_KEY

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "yurucommu-db-2"
database_id = "001874df-4810-419d-baff-7fc047f1d380"
migrations_dir = "migrations"

# R2 Bucket
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "yurucommu-media-2"

# KV Namespace (OAuth state, sessions)
[[kv_namespaces]]
binding = "KV"
id = "5fb8a5d02e554f73a2390ff789390fd8"

# Queue for federation delivery (async)
[[queues.producers]]
queue = "yurucommu-delivery-2"
binding = "DELIVERY_QUEUE"

[[queues.consumers]]
queue = "yurucommu-delivery-2"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3

# Dead letter queue
[[queues.producers]]
queue = "yurucommu-delivery-dlq-2"
binding = "DELIVERY_DLQ"

[[queues.consumers]]
queue = "yurucommu-delivery-dlq-2"
max_batch_size = 10
max_batch_timeout = 60
max_retries = 1

# Static assets
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# Route - Using test subdomain
# NOTE: 以下は example test deployment route です。 yurucommu.com は 1 つの
# operator-deployment hostname であり、 yurucommu product の identity ではありません
# (design-principles.md §0.6, §7)。
# production deployer は自分の hostname / zone に置き換えてください。
[[routes]]
pattern = "test2.yurucommu.com/*"
zone_name = "yurucommu.com"
