name = "yurucommu-2"
main = "src/backend/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[vars]
TAKOS_URL = "https://test.takos.jp"
APP_URL = "https://test2.yurucommu.com"
# Password authentication is enabled by setting AUTH_PASSWORD_HASH via wrangler secret put.
# Format: saltHex:hashHex
# AUTH_PASSWORD_HASH = "0123456789abcdef0123456789abcdef:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
#
# Session and token encryption:
# ENCRYPTION_KEY = "..."  # Generate with: openssl rand -hex 32

# Secrets (set via wrangler secret put):
# - TAKOS_CLIENT_ID
# - TAKOS_CLIENT_SECRET
# - AUTH_PASSWORD_HASH
# - ENCRYPTION_KEY

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "yurucommu-db-2"
database_id = "001874df-4810-419d-baff-7fc047f1d380"
migrations_dir = "migrations"

# R2 Bucket
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "yurucommu-media-2"

# KV Namespace (OAuth state, sessions)
[[kv_namespaces]]
binding = "KV"
id = "5fb8a5d02e554f73a2390ff789390fd8"

# Queue for federation delivery (async)
[[queues.producers]]
queue = "yurucommu-delivery-2"
binding = "DELIVERY_QUEUE"

[[queues.consumers]]
queue = "yurucommu-delivery-2"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3

# Dead letter queue
[[queues.producers]]
queue = "yurucommu-delivery-dlq-2"
binding = "DELIVERY_DLQ"

[[queues.consumers]]
queue = "yurucommu-delivery-dlq-2"
max_batch_size = 10
max_batch_timeout = 60
max_retries = 1

# Static assets
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# Route - Using test subdomain
[[routes]]
pattern = "test2.yurucommu.com/*"
zone_name = "yurucommu.com"
