name = "yurucommu"
main = "src/backend/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[vars]
APP_URL = "https://test.yurucommu.com"

# Authentication Configuration
# Set any combination of the following to enable different auth methods:
#
# Password authentication (PBKDF2-hashed):
# AUTH_PASSWORD_HASH = "pbkdf2:sha256:600000:..."  # Set via wrangler secret put
#
# Google OAuth:
# GOOGLE_CLIENT_ID = "xxx.apps.googleusercontent.com"
# GOOGLE_CLIENT_SECRET = "xxx"  # Set via wrangler secret put
#
# X/Twitter OAuth:
# X_CLIENT_ID = "xxx"
# X_CLIENT_SECRET = "xxx"  # Set via wrangler secret put
#
# Takos OAuth (enables Takos API access):
TAKOS_URL = "https://takos.jp"
# TAKOS_CLIENT_ID = "xxx"  # Set via wrangler secret put
# TAKOS_CLIENT_SECRET = "xxx"  # Set via wrangler secret put

# Secrets (set via wrangler secret put):
# - AUTH_PASSWORD_HASH (optional)
# - GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET (optional)
# - X_CLIENT_ID, X_CLIENT_SECRET (optional)
# - TAKOS_CLIENT_ID, TAKOS_CLIENT_SECRET (optional)

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "yurucommu-db"
database_id = "3ad92a66-b4e2-41cc-8145-46f407b1718e"
migrations_dir = "migrations"

# Queue for federation delivery (async)
[[queues.producers]]
queue = "yurucommu-delivery"
binding = "DELIVERY_QUEUE"

[[queues.consumers]]
queue = "yurucommu-delivery"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3

# Dead letter queue (application-level dead letters + reconciliation scheduling)
[[queues.producers]]
queue = "yurucommu-delivery-dlq"
binding = "DELIVERY_DLQ"

[[queues.consumers]]
queue = "yurucommu-delivery-dlq"
max_batch_size = 10
max_batch_timeout = 60
max_retries = 1

# R2 Bucket
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "yurucommu-media"

# KV Namespace (for OAuth state, sessions, etc.)
# Create your KV namespace first: wrangler kv:namespace create "yurucommu-kv"
# Then replace the 'id' value with the ID from the command output.
[[kv_namespaces]]
binding = "KV"
id = "0513678273f2494385b4ab33cb9d8b22"

# Static assets
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# Route
[[routes]]
pattern = "test.yurucommu.com/*"
zone_name = "yurucommu.com"

