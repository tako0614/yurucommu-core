apiVersion: "1.0"
kind: Manifest
metadata:
  name: yurucommu
  labels:
    managed-by: takosumi-git
    takos.app: yurucommu
resources:
  - shape: worker@v1
    name: yurucommu-worker
    provider: "@takos/cloudflare-workers"
    spec:
      artifact:
        kind: js-bundle
        hash: sha256:pending
      compatibilityDate: "2025-01-01"
      compatibilityFlags:
        - nodejs_compat
        - global_fetch_strictly_public
      env:
        DELIVERY_QUEUE_NAME: yurucommu-delivery
        DELIVERY_DLQ_NAME: yurucommu-delivery-dlq
        YURUCOMMU_STRICT_READINESS: "1"
      routes:
        - /
        - /api
        - /media
        - /.well-known
        - /ap
        - /users
        - /communities
        - /inbox
    metadata:
      takosDefaultApp:
        publications:
          - name: yurucommu-ui
            type: publication.http-endpoint@v1
            route: /
        cloudflare:
          d1Databases:
            - binding: DB
              name: yurucommu-db
              migrations: migrations
          r2Buckets:
            - binding: MEDIA
              name: yurucommu-media
          kvNamespaces:
            - binding: KV
              purpose: oauth state, sessions, and rate limits
          queues:
            - binding: DELIVERY_QUEUE
              name: yurucommu-delivery
              deadLetterQueue: DELIVERY_DLQ
              maxBatchSize: 10
              maxRetries: 3
            - binding: DELIVERY_DLQ
              name: yurucommu-delivery-dlq
              maxBatchSize: 10
              maxWaitTimeMs: 60000
              maxRetries: 1
          generatedSecrets:
            - ENCRYPTION_KEY
    workflowRef:
      file: build.yml
      job: build
      artifact: yurucommu-worker
      target: spec.artifact.hash
